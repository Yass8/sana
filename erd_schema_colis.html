
<style>
#erd svg { width: 100% !important; }
</style>
<div id="erd" style="padding: 8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS {
    uuid id PK
    string name
    string email
    string phone
    enum role
    uuid agency_id FK
    timestamp created_at
  }
  AGENCIES {
    uuid id PK
    string name
    enum country
    string city
    string address
  }
  SHIPMENTS {
    uuid id PK
    string reference
    date departure_date
    date arrival_date
    enum status
    uuid origin_agency_id FK
    uuid destination_agency_id FK
    uuid created_by FK
  }
  BAGS {
    uuid id PK
    string barcode
    float weight
    enum status
    uuid shipment_id FK
    timestamp created_at
  }
  PARCELS {
    uuid id PK
    string barcode
    string description
    float weight
    uuid bag_id FK
    uuid sender_id FK
    string recipient_name
    string recipient_phone
    string recipient_email
    enum status
    timestamp created_at
  }
  TRACKING_EVENTS {
    uuid id PK
    uuid parcel_id FK
    enum status
    uuid agent_id FK
    string notes
    timestamp occurred_at
  }
  NOTIFICATIONS {
    uuid id PK
    uuid user_id FK
    uuid parcel_id FK
    enum channel
    enum status
    string error_message
    timestamp sent_at
  }

  AGENCIES ||--o{ USERS : "emploie"
  AGENCIES ||--o{ SHIPMENTS : "origine"
  AGENCIES ||--o{ SHIPMENTS : "destination"
  USERS ||--o{ SHIPMENTS : "crée"
  SHIPMENTS ||--o{ BAGS : "contient"
  BAGS ||--o{ PARCELS : "regroupe"
  USERS ||--o{ PARCELS : "expédie"
  PARCELS ||--o{ TRACKING_EVENTS : "a"
  USERS ||--o{ TRACKING_EVENTS : "enregistre"
  USERS ||--o{ NOTIFICATIONS : "reçoit"
  PARCELS ||--o{ NOTIFICATIONS : "déclenche"
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
